<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Members - SmartLibrary</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; }
        .navbar {
            background: #1a1a2e;
            color: white;
            padding: 16px 32px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar a { color: #aaa; text-decoration: none; font-size: 14px; }
        .container { max-width: 900px; margin: 32px auto; padding: 0 16px; }
        h2 { margin-bottom: 20px; color: #1a1a2e; }
        .form-box {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .form-box h3 { margin-bottom: 16px; color: #333; }
        .form-row { display: flex; gap: 12px; flex-wrap: wrap; }
        input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            padding: 10px 20px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #16213e; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        th {
            background: #1a1a2e;
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }
        td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
        tr:hover td { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="navbar">
    📚 SmartLibrary
    <a href="index.html">← Back to Home</a>
</div>

<div class="container">
    <h2>👤 Member Management</h2>

    <div class="form-box">
        <h3>Add New Member</h3>
        <div class="form-row">
            <input type="text" id="name" placeholder="Full Name" />
            <input type="email" id="email" placeholder="Email" />
            <input type="text" id="phone" placeholder="Phone" />
            <button onclick="addMember()">+ Add Member</button>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Joined Date</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="membersTable"></tbody>
    </table>
</div>

<script>
    const API = "http://localhost:8080/api/members";

    async function loadMembers() {
        const res = await fetch(API);
        const members = await res.json();
        const tbody = document.getElementById("membersTable");
        tbody.innerHTML = "";
        if (members.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:#999">No members found</td></tr>`;
            return;
        }
        members.forEach(m => {
            tbody.innerHTML += `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.name}</td>
                    <td>${m.email}</td>
                    <td>${m.phone || '-'}</td>
                    <td>${m.joinedDate}</td>
                    <td><button class="btn-danger" onclick="deleteMember(${m.id})">Delete</button></td>
                </tr>`;
        });
    }

    async function addMember() {
        const member = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            phone: document.getElementById("phone").value
        };
        if (!member.name || !member.email) {
            alert("Name and Email are required!");
            return;
        }
        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(member)
        });
        document.getElementById("name").value = "";
        document.getElementById("email").value = "";
        document.getElementById("phone").value = "";
        loadMembers();
    }

    async function deleteMember(id) {
        if (!confirm("Delete this member?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        loadMembers();
    }

    loadMembers();
</script>
</body>
</html>
